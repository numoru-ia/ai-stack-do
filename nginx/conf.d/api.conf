server {
  listen 80;
  server_name api.${DOMAIN} langfuse.${DOMAIN} grafana.${DOMAIN} qdrant.${DOMAIN};

  location /.well-known/acme-challenge/ {
    root /var/www/html;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name api.${DOMAIN};

  ssl_certificate     /etc/letsencrypt/live/api.${DOMAIN}/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.${DOMAIN}/privkey.pem;

  client_max_body_size 25m;
  proxy_read_timeout 300s;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";

  location / {
    proxy_pass http://litellm:4000;
  }
}

server {
  listen 443 ssl http2;
  server_name langfuse.${DOMAIN};

  ssl_certificate     /etc/letsencrypt/live/langfuse.${DOMAIN}/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/langfuse.${DOMAIN}/privkey.pem;

  client_max_body_size 100m;
  proxy_read_timeout 300s;

  location / {
    proxy_pass http://langfuse-web:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl http2;
  server_name grafana.${DOMAIN};

  ssl_certificate     /etc/letsencrypt/live/grafana.${DOMAIN}/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/grafana.${DOMAIN}/privkey.pem;

  location / {
    proxy_pass http://grafana:3000;
    proxy_set_header Host $host;
  }
}

server {
  listen 443 ssl http2;
  server_name qdrant.${DOMAIN};

  ssl_certificate     /etc/letsencrypt/live/qdrant.${DOMAIN}/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/qdrant.${DOMAIN}/privkey.pem;

  # Extra layer: HTTP basic auth on top of Qdrant API key
  auth_basic "Qdrant admin";
  auth_basic_user_file /etc/nginx/.htpasswd;

  location / {
    proxy_pass http://qdrant:6333;
  }
}
