global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: qdrant
    static_configs:
      - targets: ["qdrant:6333"]
    metrics_path: /metrics

  - job_name: litellm
    static_configs:
      - targets: ["litellm:4000"]
    metrics_path: /metrics

  - job_name: langfuse
    static_configs:
      - targets: ["langfuse-web:3000"]
    metrics_path: /api/public/metrics
